context:
  version: "0.2.2"

package:
  name: gwframe
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/gwframe/gwframe-${{ version }}.tar.gz
  sha256: 7c537c24bd31e0b9b6aa25d4b2f3d2a5e951fcd372c8880f4cb663e045122348

build:
  skip:
    - win
  script: build.sh
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake >=3.15
    - make
    - pkg-config
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - python
  host:
    - nanobind >=2.0.0
    - pip
    - python
    - scikit-build-core >=0.10
    - setuptools-scm >=8.0
    - ldas-tools-framecpp
    - libboost-headers
  run:
    - numpy >=1.26
    - python
    - rich >=13.0.0
    - typer >=0.20.0

tests:
  - python:
      imports:
        - gwframe
        - gwframe.read
        - gwframe.write
        - gwframe.types
      pip_check: true
  - script:
      - gwframe --help

about:
  homepage: https://git.ligo.org/olivia.godwin/gwframe
  summary: High-level Python library to work with gravitational-wave frame (GWF) files
  description: |
    gwframe is a high-level Python library for reading and writing
    gravitational-wave frame (GWF) files, built on top of frameCPP.
  license: GPL-2.0-or-later
  license_file: LICENSE
  documentation: https://git.ligo.org/olivia.godwin/gwframe
  repository: https://git.ligo.org/olivia.godwin/gwframe

extra:
  recipe-maintainers:
    - nothisisolivia
